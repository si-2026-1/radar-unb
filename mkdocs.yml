site_name: Radar UnB

nav:
  - Início: index.md
  - Histórico: historico/mudancas.md
  - Escopo: escopo/escopo.md
  - Problema: problema/problema.md
  - Requisitos:
    - Requisitos Funcionais: requisitos/req-funcionais.md
    - Requisitos Não-Funcionais: requisitos/req-nao-funcionais.md
  - Banco de Dados:
    - Modelagem Conceitual: database/modelagem-conceitual.md
    - Modelagem Lógica: database/modelagem-logica.md
  - Épicos:
    - Controle de Acesso: epicos/01-controle-de-acesso.md
    - Mapa Interativo: epicos/02-mapa-interativo.md
    - Gestão de Eventos: epicos/03-gestao-de-eventos.md
    - Gestão de Problemas de Segurança: epicos/04-gestao-de-seguranca.md
    - Filtragem e Busca Avançada: epicos/05-filtragem-busca-avancada.md

theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - meta
  - pymdownx.superfences
  - attr_list

extra:
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!
